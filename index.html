<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>E1003 Calendar</title>
  <style>
    :root{--bg:#fff;--line:#d8d8d8;--text:#111;--event:#efefef;--today:#111}
    *{box-sizing:border-box}
    html,body{margin:0;width:100%;height:100%;background:var(--bg);color:var(--text);font-family:Arial,Helvetica,sans-serif}
    body{display:flex;flex-direction:column;min-height:100vh}
    .topbar{display:flex;justify-content:center;align-items:center;padding:14px 24px 10px;border-bottom:1px solid var(--line)}
    .title{font-size:32px;font-weight:700;line-height:1}
    .nav{display:flex;gap:8px;align-items:center;margin-left:16px}
    .nav button{font-size:16px;padding:6px 10px;cursor:pointer}
    .calendar{display:grid;grid-template-columns:repeat(7,1fr);grid-template-rows:56px repeat(6,minmax(0,1fr));flex:1;min-height:0;overflow:hidden}
    .dow,.cell{border-right:1px solid var(--line);border-bottom:1px solid var(--line)}
    .dow:nth-child(7),.cell:nth-child(7n){border-right:none}
    .dow{display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;letter-spacing:.2px;background:#fafafa;color:#333}
    .cell{position:relative;padding:8px 10px 8px;min-height:0;overflow:hidden;display:flex;flex-direction:column;gap:6px}
    
    /* 保留邊框線，隱藏非本月內容 */
    .other.hidden-month * { display: none; }
    
    .date{font-size:22px;font-weight:600;line-height:1;color:var(--text);text-align:center;width:100%;display:block;flex:0 0 auto}
    .other .date{color:#9a9a9a}
    .today .date-badge{display:inline-flex;align-items:center;justify-content:center;min-width:34px;height:34px;padding:0 8px;border-radius:999px;background:var(--today);color:#fff;margin:0 auto}
    .events{display:flex;flex-direction:column;gap:6px;flex:1 1 auto;min-height:0}
    
    .event{display:flex;align-items:center;gap:6px;background:var(--event);border:1px solid #cfcfcf;border-radius:8px;padding:6px 8px;line-height:1.15;overflow:hidden;flex:0 0 auto}
    .event-time{font-size:14px;font-weight:700;color:#555;line-height:1.1;white-space:nowrap}
    .event-title{font-size:14px;font-weight:700;line-height:1.1;word-break:break-word}
    
    .debug{font-size:14px;padding:6px 10px;border-top:1px solid var(--line);background:#fff;color:#444;word-break:break-all}
  </style>
</head>
<body tabindex="0">
  <header class="topbar">
    <div class="title" id="monthTitle">July 2026</div>
    <div class="nav">
      <button id="prevBtn">‹</button>
      <button id="nextBtn">›</button>
    </div>
  </header>
  <main class="calendar" id="calendar" aria-label="Monthly calendar"></main>
  <div class="debug" id="debug">Ready</div>

  <script>
    // ⚠️ 請記得在此處填入您的 Google Apps Script 網址
    var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyiMdCmH_4MoCpOGkt4flb0luLreIjWh8NA3g7pEmbFaRbuG9P18kNF1Fqmy0L8sbjR/exec';
    
    var monthTitle = document.getElementById('monthTitle');
    var calendar = document.getElementById('calendar');
    var debug = document.getElementById('debug');
    var prevBtn = document.getElementById('prevBtn');
    var nextBtn = document.getElementById('nextBtn');
    var viewDate = new Date();
    viewDate = new Date(viewDate.getFullYear(), viewDate.getMonth(), 1);
    
    var pad = function(n) { return String(n).length < 2 ? '0' + n : String(n); };
    var keyOf = function(d) { return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate()); };
    var monthLabel = function(d) { return d.toLocaleString('en-US', { month: 'long', year: 'numeric' }); };
    var startOfMonth = function(d) { return new Date(d.getFullYear(), d.getMonth(), 1); };
    var isToday = function(d) { var t = new Date(); return d.getFullYear()===t.getFullYear() && d.getMonth()===t.getMonth() && d.getDate()===t.getDate(); };
    function setDebug(msg){ debug.textContent = msg; }
    
    function buildGrid(monthDate) {
      monthTitle.textContent = monthLabel(monthDate);
      calendar.innerHTML = '';
      ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(function(x) { 
        var el = document.createElement('div'); el.className = 'dow'; el.textContent = x; calendar.appendChild(el); 
      });
      var first = startOfMonth(monthDate);
      var start = new Date(first);
      start.setDate(first.getDate() - first.getDay());
      for (var i = 0; i < 42; i++) {
        var dt = new Date(start); dt.setDate(start.getDate() + i);
        var cell = document.createElement('section');
        cell.className = 'cell' + (dt.getMonth() !== monthDate.getMonth() ? ' other hidden-month' : '') + (isToday(dt) ? ' today' : '');
        cell.dataset.date = keyOf(dt);
        var dateDiv = document.createElement('div');
        dateDiv.className = 'date';
        dateDiv.innerHTML = isToday(dt) ? '<span class="date-badge">' + dt.getDate() + '</span>' : dt.getDate();
        cell.appendChild(dateDiv);
        var events = document.createElement('div');
        events.className = 'events';
        cell.appendChild(events);
        calendar.appendChild(cell);
      }
    }
    
    function loadEvents() {
      setDebug('Fetching data...');
      var url = SCRIPT_URL + '?year=' + encodeURIComponent(viewDate.getFullYear()) + '&month=' + encodeURIComponent(viewDate.getMonth()+1) + '&_t=' + new Date().getTime();
      
      // 終極修正：放棄 fetch，改用傳統 XMLHttpRequest 確保老舊瀏覽器 100% 相容
      var xhr = new XMLHttpRequest();
      xhr.open('GET', url, true);
      
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
          if (xhr.status >= 200 && xhr.status < 300) {
            try {
              var data = JSON.parse(xhr.responseText);
              renderEvents(data);
              setDebug('Loaded ' + monthLabel(viewDate));
            } catch (err) {
              setDebug('JSON Parse Error: ' + err.message);
            }
          } else {
            setDebug('HTTP Error Code: ' + xhr.status + ' - ' + xhr.statusText);
          }
        }
      };
      
      xhr.onerror = function() {
        setDebug('Network Error: Failed to send request. (Check CORS or network Connection)');
      };
      
      xhr.send();
    }
    
    function renderEvents(data) {
      var grouped = {};
      var eventsList = data.events || [];
      
      for (var i = 0; i < eventsList.length; i++) {
        var ev = eventsList[i];
        var day = (ev.start || '').slice(0, 10);
        if (!grouped[day]) grouped[day] = [];
        grouped[day].push(ev);
      }
      
      var cells = Array.prototype.slice.call(calendar.querySelectorAll('.cell'));
      cells.forEach(function(cell) {
        var day = cell.dataset.date;
        var list = grouped[day] || [];
        var container = cell.querySelector('.events');
        container.innerHTML = '';
        
        var displayList = list.slice(0, 3);
        displayList.forEach(function(ev) {
          var start = ev.start ? new Date(ev.start) : null;
          var end = ev.end ? new Date(ev.end) : null;
          var fmt = function(d) { return d ? pad(d.getHours()) + ':' + pad(d.getMinutes()) : ''; };
          var timeText = ev.allDay ? 'All day' : (start && end ? fmt(start) + ' - ' + fmt(end) : '');
          
          var article = document.createElement('article');
          article.className = 'event';
          var titleText = ev.title ? ev.title : '(No title)';
          article.innerHTML = '<div class="event-time">' + timeText + '</div><div class="event-title">' + titleText + '</div>';
          container.appendChild(article);
        });
      });
    }
    
    function refresh(){ 
      buildGrid(viewDate); 
      loadEvents(); 
    }
    
    prevBtn.addEventListener('click', function() { viewDate = new Date(viewDate.getFullYear(), viewDate.getMonth() - 1, 1); refresh(); });
    nextBtn.addEventListener('click', function() { viewDate = new Date(viewDate.getFullYear(), viewDate.getMonth() + 1, 1); refresh(); });
    window.addEventListener('keydown', function(e) { if (e.key === 'ArrowLeft') prevBtn.click(); if (e.key === 'ArrowRight') nextBtn.click(); });
    window.addEventListener('load', function() { refresh(); document.body.focus(); });
  </script>
</body>
</html>
