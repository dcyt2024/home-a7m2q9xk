<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>E1003 Calendar</title>
  <style>
    :root{--bg:#fff;--line:#d8d8d8;--text:#111;--event:#efefef;--today:#111}
    *{box-sizing:border-box}
    html,body{margin:0;width:100%;height:100%;background:var(--bg);color:var(--text);font-family:Arial,Helvetica,sans-serif}
    body{display:flex;flex-direction:column;min-height:100vh}
    .topbar{display:flex;justify-content:center;align-items:center;padding:14px 24px 10px;border-bottom:1px solid var(--line)}
    .title{font-size:32px;font-weight:700;line-height:1}
    .nav{display:flex;gap:8px;align-items:center;margin-left:16px}
    .nav button{font-size:16px;padding:6px 10px;cursor:pointer}
    .calendar{display:grid;grid-template-columns:repeat(7,1fr);grid-template-rows:56px repeat(6,minmax(0,1fr));flex:1;min-height:0;overflow:hidden}
    .dow,.cell{border-right:1px solid var(--line);border-bottom:1px solid var(--line)}
    .dow:nth-child(7),.cell:nth-child(7n){border-right:none}
    .dow{display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;letter-spacing:.2px;background:#fafafa;color:#333}
    .cell{position:relative;padding:10px 10px 8px;min-height:0;overflow:hidden;display:flex;flex-direction:column;gap:6px}
    
    /* 隱藏非本月格子內的文字與內容，但保留格子線 */
    .other.hidden-month * { display: none !important; }
    
    .date{font-size:22px;font-weight:600;line-height:1;color:var(--text);text-align:center;width:100%;display:block;flex:0 0 auto}
    .other .date{color:#9a9a9a}
    .today .date-badge{display:inline-flex;align-items:center;justify-content:center;min-width:34px;height:34px;padding:0 8px;border-radius:999px;background:var(--today);color:#fff;margin:0 auto}
    .events{margin-top:4px;display:flex;flex-direction:column;gap:6px;flex:1 1 auto;min-height:0}
    
    .event{background:var(--event);border:1px solid #cfcfcf;border-radius:8px;padding:6px 8px;line-height:1.15;overflow:hidden;flex:0 0 auto}
    .event-line{display:flex;gap:6px;align-items:baseline;flex-wrap:wrap}
    .event-time,.event-title{font-size:14px;font-weight:700;line-height:1.1;white-space:nowrap}
    
    .debug{font-size:14px;padding:6px 10px;border-top:1px solid var(--line);background:#fff;color:#444;word-break:break-all}
  </style>
</head>
<body tabindex="0">
  <header class="topbar">
    <div class="title" id="monthTitle">Loading...</div>
    <div class="nav">
      <button id="prevBtn">‹</button>
      <button id="nextBtn">›</button>
    </div>
  </header>
  
  <main class="calendar" id="calendar" aria-label="Monthly calendar"></main>
  <div class="debug" id="debug">Ready</div>

  <script>
    // ⚠️ 請在此處填入您的設定
    var CALENDAR_ID = 'dcyt122024@gmail.com';
    var API_KEY = 'AIzaSyAUhbzcmS9bdGjTwxNmi3RP2MuuOK7U-Io'; 

    var monthTitle = document.getElementById('monthTitle');
    var calendar = document.getElementById('calendar');
    var debug = document.getElementById('debug');
    var prevBtn = document.getElementById('prevBtn');
    var nextBtn = document.getElementById('nextBtn');
    
    // 初始化為當前系統日期
    var viewDate = new Date();
    viewDate = new Date(viewDate.getFullYear(), viewDate.getMonth(), 1);
    
    // 徹底放棄 ES6 Map，改用純 Object 物件對照
    var cellElements = {}; 
    
    var pad = function(n) { return String(n).length < 2 ? '0' + n : String(n); };
    var keyOf = function(d) { return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate()); };
    var monthLabel = function(d) { return d.toLocaleString('en-US', { month: 'long', year: 'numeric' }); };
    var isToday = function(d) { var t = new Date(); return d.getFullYear()===t.getFullYear() && d.getMonth()===t.getMonth() && d.getDate()===t.getDate(); };
    var fmtTime = function(d) { return pad(d.getHours()) + ':' + pad(d.getMinutes()); };
    function setDebug(msg){ debug.textContent = msg; }

    function buildGrid(monthDate) {
      monthTitle.textContent = monthLabel(monthDate);
      calendar.innerHTML = '';
      cellElements = {}; // 清空對照表
      
      // 建立星期標頭
      var dows = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      for (var d = 0; d < dows.length; d++) {
        var el = document.createElement('div');
        el.className = 'dow';
        el.textContent = dows[d];
        calendar.appendChild(el);
      }
      
      // 計算日曆網格起點（第一週的星期日）
      var firstGridDate = new Date(monthDate.getFullYear(), monthDate.getMonth(), 1);
      firstGridDate.setDate(firstGridDate.getDate() - firstGridDate.getDay());
      
      // 用最傳統的 for 迴圈動態產出 42 格
      for (var i = 0; i < 42; i++) {
        var dt = new Date(firstGridDate); 
        dt.setDate(firstGridDate.getDate() + i);
        
        var cell = document.createElement('section');
        cell.className = 'cell' + (dt.getMonth() !== monthDate.getMonth() ? ' other hidden-month' : '') + (isToday(dt) ? ' today' : '');
        
        var k = keyOf(dt);
        cell.setAttribute('data-date', k);
        cellElements[k] = cell; // 將 DOM 元素存入純物件
        
        var dateDiv = document.createElement('div');
        dateDiv.className = 'date';
        dateDiv.innerHTML = isToday(dt) ? '<span class="date-badge">' + dt.getDate() + '</span>' : dt.getDate();
        cell.appendChild(dateDiv);
        
        var events = document.createElement('div');
        events.className = 'events';
        cell.appendChild(events);
        
        calendar.appendChild(cell);
      }
    }

    function loadEvents() {
      setDebug('Fetching from Google API...');
      
      var timeMin = new Date(viewDate.getFullYear(), viewDate.getMonth(), 1).toISOString();
      var timeMax = new Date(viewDate.getFullYear(), viewDate.getMonth() + 1, 1).toISOString();
      
      var url = 'https://www.googleapis.com/calendar/v3/calendars/' + encodeURIComponent(CALENDAR_ID) + '/events' +
                '?key=' + API_KEY +
                '&timeMin=' + encodeURIComponent(timeMin) +
                '&timeMax=' + encodeURIComponent(timeMax) +
                '&singleEvents=true' +
                '&orderBy=startTime' +
                '&maxResults=250' +
                '&_t=' + new Date().getTime();
                
      var xhr = new XMLHttpRequest();
      xhr.open('GET', url, true);
      
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
          if (xhr.status >= 200 && xhr.status < 300) {
            try {
              var data = JSON.parse(xhr.responseText);
              renderEvents(data);
              setDebug('Loaded ' + monthLabel(viewDate));
            } catch (err) {
              setDebug('JSON Error: ' + err.message);
            }
          } else {
            setDebug('Google Error: ' + xhr.status);
          }
        }
      };
      
      xhr.onerror = function() {
        setDebug('Network Error.');
      };
      
      xhr.send();
    }

    function renderEvents(data) {
      var grouped = {};
      var items = data.items || [];
      
      // 傳統 for 迴圈分組
      for (var i = 0; i < items.length; i++) {
        var ev = items[i];
        var start = ev.start.dateTime || ev.start.date;
        var day = start.slice(0, 10);
        if (!grouped[day]) grouped[day] = [];
        grouped[day].push(ev);
      }

      // 遍歷渲染事件
      for (var dayKey in grouped) {
        if (!grouped.hasOwnProperty(dayKey)) continue;
        
        var cell = cellElements[dayKey];
        if (!cell) continue;
        
        var container = cell.querySelector('.events');
        if (container) {
          container.innerHTML = '';
          
          var dayItems = grouped[dayKey];
          // 最多塞 3 個事件
          var maxDisplay = dayItems.length > 3 ? 3 : dayItems.length;
          
          for (var j = 0; j < maxDisplay; j++) {
            var ev = dayItems[j];
            var startStr = ev.start.dateTime || ev.start.date;
            var endStr = ev.end.dateTime || ev.end.date;
            
            var t1 = ev.start.dateTime ? fmtTime(new Date(startStr)) : 'All day';
            var t2 = ev.start.dateTime ? fmtTime(new Date(endStr)) : '';
            
            var article = document.createElement('article');
            article.className = 'event';
            
            var timeSpanText = t1 + (t2 ? '-' + t2 : '');
            var titleText = ev.summary ? ev.summary : '(No title)';
            
            article.innerHTML = '<div class="event-line"><span class="event-time">' + timeSpanText + '</span><span class="event-title">' + titleText + '</span></div>';
            container.appendChild(article);
          }
        }
      }
    }

    function refresh() {
      buildGrid(viewDate);
      loadEvents();
    }

    // 按鈕監聽
    prevBtn.addEventListener('click', function() { viewDate = new Date(viewDate.getFullYear(), viewDate.getMonth() - 1, 1); refresh(); });
    nextBtn.addEventListener('click', function() { viewDate = new Date(viewDate.getFullYear(), viewDate.getMonth() + 1, 1); refresh(); });
    window.addEventListener('keydown', function(e) { if (e.key === 'ArrowLeft') prevBtn.click(); if (e.key === 'ArrowRight') nextBtn.click(); });
    
    // 啟動
    window.addEventListener('load', function() { refresh(); document.body.focus(); });
  </script>
</body>
</html>
