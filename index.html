<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>E1003 Calendar</title>
  <style>
    :root{--bg:#fff;--line:#d8d8d8;--text:#111;--event:#efefef;--today:#0066cc}
    *{box-sizing:border-box}
    html,body{margin:0;width:100%;height:100%;background:var(--bg);color:var(--text);font-family:Arial,Helvetica,sans-serif}
    body{display:flex;flex-direction:column;min-height:100vh}
    
    .topbar{display:flex;justify-content:space-between;align-items:center;padding:12px 20px;border-bottom:1px solid var(--line)}
    .title{font-size:28px;font-weight:700}
    .nav-btn{font-size:28px;width:50px;height:50px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:#f0f0f0}

    .calendar{display:grid;grid-template-columns:repeat(7,1fr);grid-template-rows:48px repeat(6,1fr);flex:1;min-height:0}
    .dow,.cell{border-right:1px solid var(--line);border-bottom:1px solid var(--line)}
    .dow:nth-child(7),.cell:nth-child(7n){border-right:none}
    .dow{display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;background:#fafafa;color:#333}

    .cell{position:relative;padding:8px 6px;min-height:0;overflow:hidden}
    .date{font-size:20px;font-weight:600;text-align:center;display:block;margin-bottom:4px}
    .other .date{color:#aaa}
    .today .date{background:var(--today);color:#fff;width:32px;height:32px;line-height:32px;border-radius:50%;margin:0 auto}

    .events{margin-top:4px;display:flex;flex-direction:column;gap:3px}
    .event{background:var(--event);border:1px solid #ddd;border-radius:6px;padding:5px 7px;font-size:15px;line-height:1.2}

    #status {padding:12px 20px; background:#fff3cd; color:#856404; font-size:15px; border-bottom:1px solid #ffeaa7; text-align:center; min-height:60px;}
  </style>
</head>
<body>
  <header class="topbar">
    <button class="nav-btn" id="prev">‹</button>
    <div class="title" id="monthTitle">E1003 月曆</div>
    <button class="nav-btn" id="next">›</button>
  </header>

  <div id="status">正在初始化...</div>
  <main class="calendar" id="calendar"></main>

  <script>
    const CALENDAR_ID = 'dcyt122024@gmail.com';
    const API_KEY = 'AIzaSyAYBpOB6UoMYeAAmwTM_1KdYEzwtv6zXiE';   // ← 確認已貼上

    let currentDate = new Date(2026, 6, 1);

    function updateStatus(msg) {
      document.getElementById('status').textContent = msg;
    }

    function generateCalendar() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      document.getElementById('monthTitle').textContent = `${year} 年 ${month + 1} 月`;

      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const daysInPrevMonth = new Date(year, month, 0).getDate();

      const calendar = document.getElementById('calendar');
      calendar.innerHTML = '';

      const days = ['日','一','二','三','四','五','六'];
      days.forEach(d => {
        const div = document.createElement('div');
        div.className = 'dow';
        div.textContent = d;
        calendar.appendChild(div);
      });

      for (let i = firstDay - 1; i >= 0; i--) {
        const cell = document.createElement('section');
        cell.className = 'cell other';
        cell.innerHTML = `<div class="date">${daysInPrevMonth - i}</div>`;
        calendar.appendChild(cell);
      }

      for (let day = 1; day <= daysInMonth; day++) {
        const cell = document.createElement('section');
        cell.className = 'cell';
        if (new Date().getDate() === day && new Date().getMonth() === month && new Date().getFullYear() === year) {
          cell.classList.add('today');
        }
        cell.innerHTML = `<div class="date">${day}</div>`;
        calendar.appendChild(cell);
      }

      const remaining = 42 - (firstDay + daysInMonth);
      for (let day = 1; day <= remaining; day++) {
        const cell = document.createElement('section');
        cell.className = 'cell other';
        cell.innerHTML = `<div class="date">${day}</div>`;
        calendar.appendChild(cell);
      }
    }

    async function loadEvents() {
      updateStatus('正在呼叫 Google Calendar API... (最多等 8 秒)');

      const timeoutId = setTimeout(() => {
        updateStatus('❌ 連線超時 - E1003 可能無法連 Google 或瀏覽器限制');
      }, 8000);

      try {
        const year = currentDate.getFullYear();
        const month = currentDate.getMonth();
        const timeMin = new Date(year, month, 1).toISOString();
        const timeMax = new Date(year, month + 1, 1).toISOString();

        const url = `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CALENDAR_ID)}/events?key=${API_KEY}&timeMin=${timeMin}&timeMax=${timeMax}&singleEvents=true&orderBy=startTime&maxResults=250`;

        const res = await fetch(url);
        clearTimeout(timeoutId);

        updateStatus(`伺服器回應: ${res.status}`);

        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const data = await res.json();
        updateStatus(`✅ 成功！共 ${data.items ? data.items.length : 0} 筆活動`);

        // 渲染事件（略）
        const grouped = new Map();
        (data.items || []).forEach(ev => {
          const dayKey = (ev.start.dateTime || ev.start.date).slice(0,10);
          if (!grouped.has(dayKey)) grouped.set(dayKey, []);
          grouped.get(dayKey).push(ev);
        });

        grouped.forEach((events, dayKey) => {
          const dayNum = parseInt(dayKey.slice(8));
          const cell = Array.from(document.querySelectorAll('.cell:not(.other)')).find(c => 
            parseInt(c.querySelector('.date').textContent) === dayNum
          );
          if (cell) {
            let container = cell.querySelector('.events') || document.createElement('div');
            container.className = 'events';
            cell.appendChild(container);
            container.innerHTML = events.slice(0,2).map(ev => {
              const t = ev.start.dateTime ? new Date(ev.start.dateTime).toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'}) : '全天';
              return `<div class="event"><span class="event-time">${t}</span> ${ev.summary || ''}</div>`;
            }).join('');
          }
        });

      } catch (err) {
        clearTimeout(timeoutId);
        updateStatus(`❌ ${err.message}`);
      }
    }

    window.onload = () => {
      generateCalendar();
      loadEvents();

      document.getElementById('prev').onclick = () => { currentDate.setMonth(currentDate.getMonth()-1); generateCalendar(); loadEvents(); };
      document.getElementById('next').onclick = () => { currentDate.setMonth(currentDate.getMonth()+1); generateCalendar(); loadEvents(); };
    };
  </script>
</body>
</html>
