<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>E1003 Calendar</title>
  <style>
    :root{--bg:#fff;--line:#d8d8d8;--text:#111;--event:#efefef;--today:#111}
    *{box-sizing:border-box}
    html,body{margin:0;width:100%;height:100%;background:var(--bg);color:var(--text);font-family:Arial,Helvetica,sans-serif}
    body{display:flex;flex-direction:column;min-height:100vh}
    .topbar{display:flex;justify-content:center;align-items:center;padding:14px 24px 10px;border-bottom:1px solid var(--line)}
    .title{font-size:32px;font-weight:700;line-height:1}
    .nav{display:flex;gap:8px;align-items:center;margin-left:16px}
    .nav button{font-size:16px;padding:6px 10px;cursor:pointer}
    .calendar{display:grid;grid-template-columns:repeat(7,1fr);grid-template-rows:56px repeat(6,minmax(0,1fr));flex:1;min-height:0;overflow:hidden}
    .dow,.cell{border-right:1px solid var(--line);border-bottom:1px solid var(--line)}
    .dow:nth-child(7),.cell:nth-child(7n){border-right:none}
    .dow{display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;letter-spacing:.2px;background:#fafafa;color:#333}
    .cell{position:relative;padding:8px 10px 8px;min-height:0;overflow:hidden;display:flex;flex-direction:column;gap:6px}
    
    /* 修正：保留 cell 容器與邊框線，只隱藏內部的所有元件 */
    .other.hidden-month * { display: none; }
    
    .date{font-size:22px;font-weight:600;line-height:1;color:var(--text);text-align:center;width:100%;display:block;flex:0 0 auto}
    .other .date{color:#9a9a9a}
    .today .date-badge{display:inline-flex;align-items:center;justify-content:center;min-width:34px;height:34px;padding:0 8px;border-radius:999px;background:var(--today);color:#fff;margin:0 auto}
    .events{display:flex;flex-direction:column;gap:6px;flex:1 1 auto;min-height:0}
    
    .event{display:flex;align-items:center;gap:6px;background:var(--event);border:1px solid #cfcfcf;border-radius:8px;padding:6px 8px;line-height:1.15;overflow:hidden;flex:0 0 auto}
    .event-time{font-size:14px;font-weight:700;color:#555;line-height:1.1;white-space:nowrap}
    .event-title{font-size:14px;font-weight:700;line-height:1.1;word-break:break-word}
    
    .debug{font-size:14px;padding:6px 10px;border-top:1px solid var(--line);background:#fff;color:#444}
  </style>
</head>
<body tabindex="0">
  <header class="topbar">
    <div class="title" id="monthTitle">July 2026</div>
    <div class="nav">
      <button id="prevBtn">‹</button>
      <button id="nextBtn">›</button>
    </div>
  </header>
  <main class="calendar" id="calendar" aria-label="Monthly calendar"></main>
  <div class="debug" id="debug">Ready</div>

  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyiMdCmH_4MoCpOGkt4flb0luLreIjWh8NA3g7pEmbFaRbuG9P18kNF1Fqmy0L8sbjR/exec';
    const monthTitle = document.getElementById('monthTitle');
    const calendar = document.getElementById('calendar');
    const debug = document.getElementById('debug');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    let viewDate = new Date();
    viewDate = new Date(viewDate.getFullYear(), viewDate.getMonth(), 1);
    const pad = n => String(n).padStart(2, '0');
    const keyOf = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    const monthLabel = d => d.toLocaleString('en-US', { month: 'long', year: 'numeric' });
    const startOfMonth = d => new Date(d.getFullYear(), d.getMonth(), 1);
    const isToday = d => { const t = new Date(); return d.getFullYear()===t.getFullYear() && d.getMonth()===t.getMonth() && d.getDate()===t.getDate(); };
    function setDebug(msg){ debug.textContent = msg; }
    function buildGrid(monthDate) {
      monthTitle.textContent = monthLabel(monthDate);
      calendar.innerHTML = '';
      ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(x => { const el = document.createElement('div'); el.className = 'dow'; el.textContent = x; calendar.appendChild(el); });
      const first = startOfMonth(monthDate);
      const start = new Date(first);
      start.setDate(first.getDate() - first.getDay());
      for (let i = 0; i < 42; i++) {
        const dt = new Date(start); dt.setDate(start.getDate() + i);
        const cell = document.createElement('section');
        cell.className = 'cell' + (dt.getMonth() !== monthDate.getMonth() ? ' other hidden-month' : '') + (isToday(dt) ? ' today' : '');
        cell.dataset.date = keyOf(dt);
        const dateDiv = document.createElement('div');
        dateDiv.className = 'date';
        dateDiv.innerHTML = isToday(dt) ? `<span class="date-badge">${dt.getDate()}</span>` : `${dt.getDate()}`;
        cell.appendChild(dateDiv);
        const events = document.createElement('div');
        events.className = 'events';
        cell.appendChild(events);
        calendar.appendChild(cell);
      }
    }
    async function loadEvents() {
      const url = `${SCRIPT_URL}?year=${encodeURIComponent(viewDate.getFullYear())}&month=${encodeURIComponent(viewDate.getMonth()+1)}`;
      const res = await fetch(url, { cache: 'no-store' });
      const txt = await res.text();
      if (!res.ok) throw new Error(`HTTP ${res.status}: ${txt.slice(0,120)}`);
      const data = JSON.parse(txt);
      const grouped = new Map();
      (data.events || []).forEach(ev => {
        const day = (ev.start || '').slice(0, 10);
        if (!grouped.has(day)) grouped.set(day, []);
        grouped.get(day).push(ev);
      });
      [...calendar.querySelectorAll('.cell')].forEach(cell => {
        const day = cell.dataset.date;
        const list = grouped.get(day) || [];
        const container = cell.querySelector('.events');
        container.innerHTML = '';
        list.slice(0, 3).forEach(ev => {
          const start = ev.start ? new Date(ev.start) : null;
          const end = ev.end ? new Date(ev.end) : null;
          const fmt = d => d ? `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}` : '';
          const timeText = ev.allDay ? 'All day' : (start && end ? `${fmt(start)} - ${fmt(end)}` : '');
          const article = document.createElement('article');
          article.className = 'event';
          article.innerHTML = `<div class="event-time">${timeText}</div><div class="event-title">${ev.title || '(No title)'}</div>`;
          container.appendChild(article);
        });
      });
    }
    async function refresh(){ buildGrid(viewDate); try { await loadEvents(); setDebug('Loaded ' + monthLabel(viewDate)); } catch (e) { setDebug('Load failed: ' + e.message); } }
    prevBtn.addEventListener('click', () => { viewDate = new Date(viewDate.getFullYear(), viewDate.getMonth() - 1, 1); refresh(); });
    nextBtn.addEventListener('click', () => { viewDate = new Date(viewDate.getFullYear(), viewDate.getMonth() + 1, 1); refresh(); });
    window.addEventListener('keydown', (e) => { if (e.key === 'ArrowLeft') prevBtn.click(); if (e.key === 'ArrowRight') nextBtn.click(); });
    window.addEventListener('load', () => { refresh(); document.body.focus(); });
  </script>
</body>
</html>
