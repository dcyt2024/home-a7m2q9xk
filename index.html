<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>E1003 Calendar</title>
  <style>
    :root{--bg:#fff;--line:#d8d8d8;--text:#111;--event:#efefef;--today:#0066cc}
    *{box-sizing:border-box}
    html,body{margin:0;width:100%;height:100%;background:var(--bg);color:var(--text);font-family:Arial,Helvetica,sans-serif}
    body{display:flex;flex-direction:column;min-height:100vh}
    
    .topbar{display:flex;justify-content:space-between;align-items:center;padding:12px 20px;border-bottom:1px solid var(--line)}
    .title{font-size:28px;font-weight:700}
    .nav-btn{font-size:28px;width:50px;height:50px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:#f0f0f0}

    .calendar{display:grid;grid-template-columns:repeat(7,1fr);grid-template-rows:48px repeat(6,1fr);flex:1;min-height:0}
    .dow,.cell{border-right:1px solid var(--line);border-bottom:1px solid var(--line)}
    .dow:nth-child(7),.cell:nth-child(7n){border-right:none}
    .dow{display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;background:#fafafa;color:#333}

    .cell{position:relative;padding:8px 6px;min-height:0;overflow:hidden}
    .date{font-size:20px;font-weight:600;text-align:center;display:block;margin-bottom:4px}
    .other .date{color:#aaa}
    .today .date{background:var(--today);color:#fff;width:32px;height:32px;line-height:32px;border-radius:50%;margin:0 auto}

    .events{margin-top:4px;display:flex;flex-direction:column;gap:3px}
    .event{background:var(--event);border:1px solid #ddd;border-radius:6px;padding:5px 7px;font-size:15px;line-height:1.2}

    #status {padding:12px 20px; background:#fff3cd; color:#856404; font-size:15px; border-bottom:1px solid #ffeaa7; text-align:center; min-height:52px;}
  </style>
</head>
<body>
  <header class="topbar">
    <button class="nav-btn" id="prev">‹</button>
    <div class="title" id="monthTitle">E1003 月曆</div>
    <button class="nav-btn" id="next">›</button>
  </header>

  <div id="status">正在初始化...</div>
  <main class="calendar" id="calendar"></main>

  <script>
    const CALENDAR_ID = 'dcyt122024@gmail.com';
    const API_KEY = 'AIzaSyAYBpOB6UoMYeAAmwTM_1KdYEzwtv6zXiE';   // ←←← 務必替換成你的真實 API Key

    let currentDate = new Date(2026, 6, 1);

    function updateStatus(msg) {
      document.getElementById('status').textContent = msg;
    }

    function formatMonthTitle(date) {
      return `${date.getFullYear()} 年 ${date.getMonth() + 1} 月`;
    }

    function generateCalendar() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      document.getElementById('monthTitle').textContent = formatMonthTitle(currentDate);

      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const daysInPrevMonth = new Date(year, month, 0).getDate();

      const calendar = document.getElementById('calendar');
      calendar.innerHTML = '';

      const days = ['日','一','二','三','四','五','六'];
      days.forEach(d => {
        const div = document.createElement('div');
        div.className = 'dow';
        div.textContent = d;
        calendar.appendChild(div);
      });

      for (let i = firstDay - 1; i >= 0; i--) {
        const cell = createCell(daysInPrevMonth - i, true);
        calendar.appendChild(cell);
      }

      for (let day = 1; day <= daysInMonth; day++) {
        const cell = createCell(day, false, year, month);
        calendar.appendChild(cell);
      }

      const totalCells = Math.ceil((firstDay + daysInMonth) / 7) * 7;
      for (let day = 1; day <= totalCells - firstDay - daysInMonth; day++) {
        const cell = createCell(day, true);
        calendar.appendChild(cell);
      }
    }

    function createCell(day, isOther, year = null, month = null) {
      const cell = document.createElement('section');
      cell.className = `cell ${isOther ? 'other' : ''}`;
      const dateDiv = document.createElement('div');
      dateDiv.className = 'date';
      dateDiv.textContent = day;
      cell.appendChild(dateDiv);

      const today = new Date();
      if (!isOther && year === today.getFullYear() && month === today.getMonth() && day === today.getDate()) {
        cell.classList.add('today');
      }
      return cell;
    }

    async function loadEvents() {
      if (!API_KEY || API_KEY.includes('請在這裡貼上')) {
        updateStatus('❌ 請先替換成你的真實 API Key');
        return;
      }

      updateStatus('正在呼叫 Google Calendar API...');

      try {
        const year = currentDate.getFullYear();
        const month = currentDate.getMonth();
        const timeMin = new Date(year, month, 1).toISOString();
        const timeMax = new Date(year, month + 1, 1).toISOString();

        const url = `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CALENDAR_ID)}/events?key=${API_KEY}&timeMin=${timeMin}&timeMax=${timeMax}&singleEvents=true&orderBy=startTime&maxResults=250`;

        const res = await fetch(url);
        updateStatus(`伺服器回應: ${res.status} ${res.statusText}`);

        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const data = await res.json();
        updateStatus(`✅ 成功載入 ${data.items ? data.items.length : 0} 筆活動`);

        // 渲染事件
        const grouped = new Map();
        (data.items || []).forEach(ev => {
          const start = ev.start.dateTime || ev.start.date;
          const dayKey = start.slice(0, 10);
          if (!grouped.has(dayKey)) grouped.set(dayKey, []);
          grouped.get(dayKey).push(ev);
        });

        grouped.forEach((events, dayKey) => {
          const dayNum = parseInt(dayKey.slice(8));
          const cells = document.querySelectorAll('.cell:not(.other)');
          const cell = Array.from(cells).find(c => parseInt(c.querySelector('.date').textContent) === dayNum);
          if (!cell) return;

          let container = cell.querySelector('.events');
          if (!container) {
            container = document.createElement('div');
            container.className = 'events';
            cell.appendChild(container);
          }
          container.innerHTML = '';

          events.slice(0, 3).forEach(ev => {
            const startTime = ev.start.dateTime ? new Date(ev.start.dateTime) : null;
            const timeStr = startTime ? 
              `${startTime.getHours().toString().padStart(2,'0')}:${startTime.getMinutes().toString().padStart(2,'0')}` : '全天';

            const article = document.createElement('article');
            article.className = 'event';
            article.innerHTML = `<span class="event-time">${timeStr}</span> ${ev.summary || '(無標題)'}`;
            container.appendChild(article);
          });
        });
      } catch (err) {
        console.error(err);
        updateStatus(`❌ 錯誤: ${err.message || '無法連線到 Google'}`);
      }
    }

    // 初始化與按鈕
    window.onload = () => {
      generateCalendar();
      loadEvents();

      document.getElementById('prev').onclick = () => {
        currentDate.setMonth(currentDate.getMonth() - 1);
        generateCalendar();
        loadEvents();
      };
      document.getElementById('next').onclick = () => {
        currentDate.setMonth(currentDate.getMonth() + 1);
        generateCalendar();
        loadEvents();
      };
    };
  </script>
</body>
</html>
