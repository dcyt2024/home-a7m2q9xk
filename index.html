<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Calendar</title>
  <style>
    body {
      margin: 0;
      background: #f5f5f5;
      font-family: Arial, sans-serif;
    }
    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 16px;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    iframe {
      display: block;
      width: 100%;
      height: 90vh;
      border: 0;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <iframe
        src="https://calendar.google.com/calendar/embed?src=dcyt122024%40gmail.com&ctz=Asia%2FHong_Kong&mode=MONTH&hl=en"
        frameborder="0"
        scrolling="no">
      </iframe>
    </div>
  </div>
</body>
</html>
