<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>E1003 Calendar</title>
  <style>
    :root{--bg:#fff;--line:#d8d8d8;--text:#111;--event:#efefef;--today:#111}
    *{box-sizing:border-box}
    html,body{margin:0;width:100%;height:100%;background:var(--bg);color:var(--text);font-family:Arial,Helvetica,sans-serif}
    body{display:flex;flex-direction:column;min-height:100vh}
    .topbar{display:flex;justify-content:center;align-items:center;padding:14px 24px 10px;border-bottom:1px solid var(--line)}
    .title{font-size:32px;font-weight:700;line-height:1}
    .calendar{display:grid;grid-template-columns:repeat(7,1fr);grid-template-rows:56px repeat(5,1fr);flex:1;min-height:0}
    .dow,.cell{border-right:1px solid var(--line);border-bottom:1px solid var(--line)}
    .dow:nth-child(7),.cell:nth-child(7n){border-right:none}
    .dow{display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;letter-spacing:.2px;background:#fafafa;color:#333}
    .cell{position:relative;padding:6px 6px 4px;min-height:0;overflow:hidden}
    .date{font-size:20px;font-weight:600;line-height:1;color:var(--text);text-align:center;width:100%;display:block}
    .other .date{color:#9a9a9a}
    .today .date-badge{display:inline-flex;align-items:center;justify-content:center;min-width:30px;height:30px;padding:0 6px;border-radius:999px;background:var(--today);color:#fff;margin:0 auto}
    
    .events{margin-top:4px;display:flex;flex-direction:column;gap:2px}
    .event{background:var(--event);border:1px solid #cfcfcf;border-radius:6px;padding:4px 6px;overflow:hidden}
    
    /* 這裡使用相容性最好的標準文字流佈局，並允許標題自動換行 */
    .event-line{display:block;width:100%;text-align:left}
    .event-time {
      display: inline-block;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.3;
      white-space: nowrap;
      margin-right: 6px;
      vertical-align: top;
    }
    .event-title {
      display: inline;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.3;
      white-space: normal !important;
      word-break: break-all !important;
      word-wrap: break-word !important;
      vertical-align: top;
    }
  </style>
</head>
<body>
  <header class="topbar"><div class="title">July 2026</div></header>
  <main class="calendar" aria-label="July 2026 calendar">
    <div class="dow">Sun</div><div class="dow">Mon</div><div class="dow">Tue</div><div class="dow">Wed</div><div class="dow">Thu</div><div class="dow">Fri</div><div class="dow">Sat</div>
    <section class="cell other"><div class="date">28</div></section><section class="cell other"><div class="date">29</div></section><section class="cell other"><div class="date">30</div></section><section class="cell"><div class="date">1</div></section><section class="cell"><div class="date">2</div></section><section class="cell"><div class="date">3</div></section><section class="cell"><div class="date">4</div></section>
    <section class="cell"><div class="date">5</div></section><section class="cell"><div class="date">6</div></section><section class="cell"><div class="date">7</div></section><section class="cell"><div class="date">8</div></section><section class="cell"><div class="date">9</div></section><section class="cell"><div class="date">10</div></section><section class="cell today"><div class="date"><span class="date-badge">11</span></div></section>
    <section class="cell"><div class="date">12</div></section>
    <section class="cell"><div class="date">13</div></section><section class="cell"><div class="date">14</div></section><section class="cell"><div class="date">15</div></section><section class="cell"><div class="date">16</div></section><section class="cell"><div class="date">17</div></section><section class="cell"><div class="date">18</div></section>
    <section class="cell"><div class="date">19</div></section><section class="cell"><div class="date">20</div></section><section class="cell"><div class="date">21</div></section><section class="cell"><div class="date">22</div></section><section class="cell"><div class="date">23</div></section><section class="cell"><div class="date">24</div></section><section class="cell"><div class="date">25</div></section>
    <section class="cell"><div class="date">26</div></section><section class="cell"><div class="date">27</div></section><section class="cell"><div class="date">28</div></section><section class="cell"><div class="date">29</div></section><section class="cell"><div class="date">30</div></section><section class="cell"><div class="date">31</div></section><section class="cell other"><div class="date">1</div></section>
  </main>

  <script>
    var CALENDAR_ID = 'dcyt122024@gmail.com';
    var API_KEY = 'AIzaSyAYBpOB6UoMYeAAmwTM_1KdYEzwtv6zXiE';

    var cellMap = new Map();
    var firstGridDate = new Date(2026, 5, 28);
    
    var cells = document.querySelectorAll('.cell');
    for (var i = 0; i < cells.length; i++) {
      var dt = new Date(firstGridDate);
      dt.setDate(firstGridDate.getDate() + i);
      var k = dt.getFullYear() + '-' + String(dt.getMonth()+1).padStart(2,'0') + '-' + String(dt.getDate()).padStart(2,'0');
      cellMap.set(k, cells[i]);
    }

    var fmtTime = function(d) {
      return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
    };

    function loadEvents() {
      var timeMin = encodeURIComponent(new Date(2026, 6, 1).toISOString());
      var timeMax = encodeURIComponent(new Date(2026, 7, 1).toISOString());
      
      // 完全改用傳統字串拼接網址，不使用舊瀏覽器不支援的 URL 物件
      var url = 'https://www.googleapis.com/calendar/v3/calendars/' + 
                encodeURIComponent(CALENDAR_ID) + 
                '/events?key=' + API_KEY + 
                '&timeMin=' + timeMin + 
                '&timeMax=' + timeMax + 
                '&singleEvents=true&orderBy=startTime&maxResults=250';

      // 徹底放棄 async/await，改用最保險的傳統 .then() 鏈式寫法
      fetch(url)
        .then(function(res) {
          if (!res.ok) throw new Error('API error');
          return res.json();
        })
        .then(function(data) {
          var grouped = new Map();
          var items = data.items || [];
          
          items.forEach(function(ev) {
            var start = ev.start.dateTime || ev.start.date;
            var day = start.slice(0, 10);
            if (!grouped.has(day)) grouped.set(day, []);
            grouped.get(day).push(ev);
          });

          grouped.forEach(function(dayItems, day) {
            var cell = cellMap.get(day);
            if (!cell) return;
            var container = cell.querySelector('.events');
            if (!container) {
              container = document.createElement('div');
              container.className = 'events';
              cell.appendChild(container);
            }
            container.innerHTML = '';
            
            // 抓取前 3 個活動
            dayItems.slice(0, 3).forEach(function(ev) {
              var start = ev.start.dateTime || ev.start.date;
              var end = ev.end.dateTime || ev.end.date;
              var t1 = ev.start.dateTime ? fmtTime(new Date(start)) : 'All day';
              var t2 = ev.start.dateTime ? fmtTime(new Date(end)) : '';
              var article = document.createElement('article');
              article.className = 'event';
              article.innerHTML = '<div class="event-line"><span class="event-time">' + t1 + (t2 ? '-' + t2 : '') + '</span><span class="event-title">' + (ev.summary || '(No title)') + '</span></div>';
              container.appendChild(article);
            });
          });
        })
        .catch(function(err) {
          console.log(err);
        });
    }

    loadEvents();
  </script>
</body>
</html>
