<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>E1003 Calendar</title>
  <style>
    :root{--bg:#fff;--line:#d8d8d8;--text:#111;--event:#efefef;--today:#111}
    *{box-sizing:border-box}
    html,body{margin:0;width:100%;height:100%;background:var(--bg);color:var(--text);font-family:Arial,Helvetica,sans-serif}
    body{display:flex;flex-direction:column;min-height:100vh}

    .topbar{display:flex;justify-content:space-between;align-items:center;padding:14px 24px 10px;border-bottom:1px solid var(--line)}
    .title{font-size:32px;font-weight:700;line-height:1}
    .nav-btn{font-size:32px;width:50px;height:50px;display:flex;align-items:center;justify-content:center;background:none;border:none;cursor:pointer}

    .calendar{display:grid;grid-template-columns:repeat(7,1fr);grid-template-rows:56px repeat(5,1fr);flex:1;min-height:0}
    .dow,.cell{border-right:1px solid var(--line);border-bottom:1px solid var(--line)}
    .dow:nth-child(7),.cell:nth-child(7n){border-right:none}
    .dow{display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;letter-spacing:.2px;background:#fafafa;color:#333}

    .cell{position:relative;padding:10px 10px 8px;min-height:0;overflow:hidden}
    .date{font-size:22px;font-weight:600;line-height:1;color:var(--text);text-align:center;width:100%;display:block}
    .other .date{color:#9a9a9a}
    .today .date-badge{display:inline-flex;align-items:center;justify-content:center;min-width:34px;height:34px;padding:0 8px;border-radius:999px;background:var(--today);color:#fff;margin:0 auto}

    .events{margin-top:8px;display:flex;flex-direction:column;gap:4px}
    .event{background:var(--event);border:1px solid #cfcfcf;border-radius:8px;padding:6px 8px;line-height:1.15;overflow:hidden}
    .event-line{display:flex;gap:6px;align-items:baseline;flex-wrap:wrap}
    .event-time,.event-title{font-size:18px;font-weight:700;line-height:1;white-space:nowrap}
  </style>
</head>
<body>
  <header class="topbar">
    <button class="nav-btn" id="prev">‹</button>
    <div class="title" id="monthTitle">July 2026</div>
    <button class="nav-btn" id="next">›</button>
  </header>

  <main class="calendar" id="calendar" aria-label="Calendar"></main>

  <script>
    const CALENDAR_ID = 'dcyt122024@gmail.com';
    const API_KEY = 'AIzaSyAYBpOB6UoMYeAAmwTM_1KdYEzwtv6zXiE';   // ← 改成你的真實 Key

    let currentYear = 2026;
    let currentMonth = 6; // 7月 (0-based)

    const fmtTime = d => `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;

    function generateCalendar() {
      const firstGridDate = new Date(currentYear, currentMonth, 1);
      const firstDay = firstGridDate.getDay();
      const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
      const prevMonthDays = new Date(currentYear, currentMonth, 0).getDate();

      document.getElementById('monthTitle').textContent = `${currentYear} 年 ${currentMonth + 1} 月`;

      const calendar = document.getElementById('calendar');
      calendar.innerHTML = '';

      // 星期
      const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      days.forEach(d => {
        const div = document.createElement('div');
        div.className = 'dow';
        div.textContent = d;
        calendar.appendChild(div);
      });

      // 上個月
      for (let i = firstDay - 1; i >= 0; i--) {
        const cell = document.createElement('section');
        cell.className = 'cell other';
        cell.innerHTML = `<div class="date">${prevMonthDays - i}</div>`;
        calendar.appendChild(cell);
      }

      // 本月
      for (let day = 1; day <= daysInMonth; day++) {
        const cell = document.createElement('section');
        cell.className = 'cell';
        const isToday = (new Date().getFullYear() === currentYear && new Date().getMonth() === currentMonth && new Date().getDate() === day);
        cell.innerHTML = isToday 
          ? `<div class="date"><span class="date-badge">${day}</span></div>` 
          : `<div class="date">${day}</div>`;
        calendar.appendChild(cell);
      }

      // 下個月
      const totalCells = Math.ceil((firstDay + daysInMonth) / 7) * 7;
      for (let day = 1; day <= totalCells - firstDay - daysInMonth; day++) {
        const cell = document.createElement('section');
        cell.className = 'cell other';
        cell.innerHTML = `<div class="date">${day}</div>`;
        calendar.appendChild(cell);
      }
    }

    async function loadEvents() {
      const timeMin = new Date(currentYear, currentMonth, 1).toISOString();
      const timeMax = new Date(currentYear, currentMonth + 1, 1).toISOString();

      const url = new URL(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CALENDAR_ID)}/events`);
      url.searchParams.set('key', API_KEY);
      url.searchParams.set('timeMin', timeMin);
      url.searchParams.set('timeMax', timeMax);
      url.searchParams.set('singleEvents', 'true');
      url.searchParams.set('orderBy', 'startTime');
      url.searchParams.set('maxResults', '250');

      try {
        const res = await fetch(url.toString());
        if (!res.ok) throw new Error('API error');
        const data = await res.json();

        const grouped = new Map();
        (data.items || []).forEach(ev => {
          const start = ev.start.dateTime || ev.start.date;
          const day = start.slice(0, 10);
          if (!grouped.has(day)) grouped.set(day, []);
          grouped.get(day).push(ev);
        });

        // 清空舊事件
        document.querySelectorAll('.events').forEach(el => el.remove());

        grouped.forEach((items, dayKey) => {
          const day = parseInt(dayKey.slice(8));
          const cells = document.querySelectorAll('.cell');
          const cell = Array.from(cells).find(c => {
            const d = c.querySelector('.date');
            return d && !c.classList.contains('other') && parseInt(d.textContent) === day;
          });

          if (cell) {
            let container = cell.querySelector('.events');
            if (!container) {
              container = document.createElement('div');
              container.className = 'events';
              cell.appendChild(container);
            }
            container.innerHTML = '';

            items.slice(0, 3).forEach(ev => {
              const start = ev.start.dateTime || ev.start.date;
              const end = ev.end.dateTime || ev.end.date;
              const t1 = ev.start.dateTime ? fmtTime(new Date(start)) : 'All day';
              const t2 = ev.start.dateTime ? fmtTime(new Date(end)) : '';
              const article = document.createElement('article');
              article.className = 'event';
              article.innerHTML = `<div class="event-line"><span class="event-time">${t1}${t2 ? '-' + t2 : ''}</span><span class="event-title">${ev.summary || '(No title)'}</span></div>`;
              container.appendChild(article);
            });
          }
        });
      } catch (e) {
        console.error(e);
      }
    }

    // 初始化
    generateCalendar();
    loadEvents();

    // 切換
    document.getElementById('prev').addEventListener('click', () => {
      currentMonth--;
      if (currentMonth < 0) {
        currentMonth = 11;
        currentYear--;
      }
      generateCalendar();
      loadEvents();
    });

    document.getElementById('next').addEventListener('click', () => {
      currentMonth++;
      if (currentMonth > 11) {
        currentMonth = 0;
        currentYear++;
      }
      generateCalendar();
      loadEvents();
    });
  </script>
</body>
</html>
