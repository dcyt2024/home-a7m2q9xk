<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>E1003 Calendar</title>
  <style>
    :root{
      --bg:#fff;
      --line:#d8d8d8;
      --text:#111;
      --event:#efefef;
      --today:#111;
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;
      width:100%;
      height:100%;
      background:var(--bg);
      color:var(--text);
      font-family:Arial,Helvetica,sans-serif;
    }
    body{
      display:flex;
      flex-direction:column;
      min-height:100vh;
    }
    .topbar{
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      padding:14px 24px 10px;
      border-bottom:1px solid var(--line);
      gap:4px;
    }
    .title{
      font-size:32px;
      font-weight:700;
      line-height:1;
    }
    .build{
      font-size:14px;
      font-weight:600;
      color:#666;
      letter-spacing:.4px;
    }
    .calendar{
      display:grid;
      grid-template-columns:repeat(7,1fr);
      grid-template-rows:56px repeat(6,1fr);
      flex:1;
      min-height:0;
    }
    .dow,.cell{
      border-right:1px solid var(--line);
      border-bottom:1px solid var(--line);
    }
    .dow:nth-child(7n), .cell:nth-child(7n){
      border-right:none;
    }
    .dow{
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:20px;
      font-weight:700;
      letter-spacing:.2px;
      background:#fafafa;
      color:#333;
    }
    .cell{
      position:relative;
      padding:10px 10px 8px;
      min-height:0;
      overflow:hidden;
      display:flex;
      flex-direction:column;
    }
    .date{
      font-size:22px;
      font-weight:600;
      line-height:1;
      color:var(--text);
      text-align:center;
      width:100%;
      display:block;
      flex:0 0 auto;
    }
    .other .date{ color:#9a9a9a; }
    .today .date-badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:34px;
      height:34px;
      padding:0 8px;
      border-radius:999px;
      background:var(--today);
      color:#fff;
      margin:0 auto;
    }
    .events{
      margin-top:8px;
      display:flex;
      flex-direction:column;
      gap:4px;
      min-height:0;
      flex:1 1 auto;
      overflow:hidden;
    }
    .event{
      background:var(--event);
      border:1px solid #cfcfcf;
      border-radius:8px;
      padding:6px 8px;
      overflow:hidden;
      flex:0 0 auto;
    }
    .event-line{
      display:block;
      width:100%;
    }
    .event-time{
      display:block;
      font-size:16px;
      font-weight:700;
      line-height:1.25;
      white-space:nowrap;
    }
    .event-title{
      display:block;
      width:100%;
      font-size:16px;
      font-weight:700;
      line-height:1.25;
      white-space:normal;
      word-break:break-word;
      overflow-wrap:anywhere;
      margin-top:2px;
    }
    .more{
      font-size:14px;
      font-weight:700;
      color:#555;
      padding-left:2px;
      margin-top:1px;
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="title">July 2026</div>
    <div class="build">BUILD NUMBER: E1003-BUILD-20260712-02</div>
  </header>

  <main class="calendar" aria-label="July 2026 calendar">
    <div class="dow">Sun</div>
    <div class="dow">Mon</div>
    <div class="dow">Tue</div>
    <div class="dow">Wed</div>
    <div class="dow">Thu</div>
    <div class="dow">Fri</div>
    <div class="dow">Sat</div>

    <section class="cell other"><span class="date">28</span></section>
    <section class="cell other"><span class="date">29</span></section>
    <section class="cell other"><span class="date">30</span></section>
    <section class="cell"><span class="date">1</span></section>
    <section class="cell"><span class="date">2</span></section>
    <section class="cell"><span class="date">3</span></section>
    <section class="cell"><span class="date">4</span></section>

    <section class="cell"><span class="date">5</span></section>
    <section class="cell"><span class="date">6</span></section>
    <section class="cell"><span class="date">7</span></section>
    <section class="cell"><span class="date">8</span></section>
    <section class="cell"><span class="date">9</span></section>
    <section class="cell"><span class="date">10</span></section>
    <section class="cell today"><span class="date-badge">11</span></section>

    <section class="cell">
      <span class="date">12</span>
      <div class="events">
        <article class="event">
          <span class="event-line event-time">14:00-14:30</span>
          <span class="event-line event-title">Test the event</span>
        </article>
        <article class="event">
          <span class="event-line event-time">16:00-16:30</span>
          <span class="event-line event-title">Second event</span>
        </article>
        <article class="event">
          <span class="event-line event-time">18:00-18:30</span>
          <span class="event-line event-title">Third event</span>
        </article>
        <div class="more">+2 more</div>
      </div>
    </section>

    <section class="cell"><span class="date">13</span></section>
    <section class="cell"><span class="date">14</span></section>
    <section class="cell"><span class="date">15</span></section>
    <section class="cell"><span class="date">16</span></section>
    <section class="cell"><span class="date">17</span></section>
    <section class="cell"><span class="date">18</span></section>

    <section class="cell"><span class="date">19</span></section>
    <section class="cell"><span class="date">20</span></section>
    <section class="cell"><span class="date">21</span></section>
    <section class="cell"><span class="date">22</span></section>
    <section class="cell"><span class="date">23</span></section>
    <section class="cell"><span class="date">24</span></section>
    <section class="cell"><span class="date">25</span></section>

    <section class="cell"><span class="date">26</span></section>
    <section class="cell"><span class="date">27</span></section>
    <section class="cell"><span class="date">28</span></section>
    <section class="cell"><span class="date">29</span></section>
    <section class="cell"><span class="date">30</span></section>
    <section class="cell"><span class="date">31</span></section>
    <section class="cell other"><span class="date">1</span></section>
  </main>

  <script>
    const CALENDAR_ID = "dcyt122024gmail.com";
    const API_KEY = "AIzaSyAYBpOB6UoMYeAAmwTM_1KdYEzwtv6zXiE";
    const BUILD_NUMBER = "E1003-BUILD-20260712-02";

    const cellMap = new Map();
    const firstGridDate = new Date(2026, 5, 28);

    document.querySelectorAll(".cell").forEach((cell, i) => {
      const dt = new Date(firstGridDate);
      dt.setDate(firstGridDate.getDate() + i);
      const k = `${dt.getFullYear()}-${String(dt.getMonth() + 1).padStart(2, "0")}-${String(dt.getDate()).padStart(2, "0")}`;
      cellMap.set(k, cell);
    });

    const fmtTime = d => String(d.getHours()).padStart(2, "0") + ":" + String(d.getMinutes()).padStart(2, "0");

    async function loadEvents() {
      const timeMin = new Date(2026, 6, 1).toISOString();
      const timeMax = new Date(2026, 7, 1).toISOString();
      const url = new URL(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CALENDAR_ID)}/events`);
      url.searchParams.set("key", API_KEY);
      url.searchParams.set("timeMin", timeMin);
      url.searchParams.set("timeMax", timeMax);
      url.searchParams.set("singleEvents", "true");
      url.searchParams.set("orderBy", "startTime");
      url.searchParams.set("maxResults", "250");

      const res = await fetch(url.toString());
      if (!res.ok) throw new Error("Google Calendar API error");
      const data = await res.json();

      const grouped = new Map();

      data.items.forEach(ev => {
        const start = ev.start.dateTime || ev.start.date;
        const day = start.slice(0, 10);
        if (!grouped.has(day)) grouped.set(day, []);
        grouped.get(day).push(ev);
      });

      for (const [day, items] of grouped.entries()) {
        const cell = cellMap.get(day);
        if (!cell) continue;

        let container = cell.querySelector(".events");
        if (!container) {
          container = document.createElement("div");
          container.className = "events";
          cell.appendChild(container);
        }

        container.innerHTML = "";

        const visibleItems = items.slice(0, 3);

        visibleItems.forEach(ev => {
          const start = ev.start.dateTime || ev.start.date;
          const end = ev.end.dateTime || ev.end.date;
          const t1 = ev.start.dateTime ? fmtTime(new Date(start)) : "All day";
          const t2 = ev.start.dateTime ? fmtTime(new Date(end)) : "";

          const article = document.createElement("article");
          article.className = "event";
          article.innerHTML = `
            <span class="event-line event-time">${t1}${t2 ? " - " + t2 : ""}</span>
            <span class="event-line event-title">${ev.summary || "No title"}</span>
          `;
          container.appendChild(article);
        });

        if (items.length > 3) {
          const more = document.createElement("div");
          more.className = "more";
          more.textContent = `+${items.length - 3} more`;
          container.appendChild(more);
        }
      }

      console.log("Build:", BUILD_NUMBER);
    }

    loadEvents().catch(err => console.error(err));
  </script>
</body>
</html>
