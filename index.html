<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>E1003 Monthly Calendar</title>
  <style>
    :root {
      --bg: #ffffff;
      --line: #d8d8d8;
      --text: #111111;
      --muted: #666666;
      --event-bg: #efefef;
      --today: #111111;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px 24px 10px;
      border-bottom: 1px solid var(--line);
    }
    .title {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.2px;
      line-height: 1.1;
    }
    .calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      grid-template-rows: 56px repeat(5, 1fr);
      flex: 1;
      min-height: 0;
    }
    .dow, .cell {
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }
    .dow:nth-child(7),
    .cell:nth-child(7n) {
      border-right: none;
    }
    .dow {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.6px;
      color: #333333;
      background: #fafafa;
    }
    .cell {
      position: relative;
      padding: 14px 14px 10px;
      min-height: 0;
    }
    .date {
      font-size: 24px;
      font-weight: 600;
      color: var(--text);
      line-height: 1;
    }
    .other .date {
      color: #9a9a9a;
    }
    .today .date-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 38px;
      height: 38px;
      padding: 0 10px;
      border-radius: 999px;
      background: var(--today);
      color: #fff;
    }
    .events {
      margin-top: 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .event {
      border: 1px solid #cfcfcf;
      background: var(--event-bg);
      border-radius: 10px;
      padding: 10px 12px;
      line-height: 1.25;
    }
    .event-line {
      display: flex;
      align-items: baseline;
      gap: 10px;
      flex-wrap: wrap;
    }
    .event-time {
      font-size: 16px;
      font-weight: 700;
      white-space: nowrap;
    }
    .event-title {
      font-size: 17px;
      font-weight: 700;
    }
    .event-sep {
      display: none;
    }
    @media (max-width: 900px) {
      .title { font-size: 22px; }
      .dow { font-size: 16px; }
      .date { font-size: 18px; }
      .today .date-badge { min-width: 30px; height: 30px; }
      .event-title { font-size: 14px; }
      .event-time { font-size: 12px; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="title">July 2026</div>
  </header>

  <main class="calendar" aria-label="July 2026 calendar">
    <div class="dow">Sun</div>
    <div class="dow">Mon</div>
    <div class="dow">Tue</div>
    <div class="dow">Wed</div>
    <div class="dow">Thu</div>
    <div class="dow">Fri</div>
    <div class="dow">Sat</div>

    <section class="cell other"><div class="date">28</div></section>
    <section class="cell other"><div class="date">29</div></section>
    <section class="cell other"><div class="date">30</div></section>
    <section class="cell"><div class="date">1</div></section>
    <section class="cell"><div class="date">2</div></section>
    <section class="cell"><div class="date">3</div></section>
    <section class="cell"><div class="date">4</div></section>

    <section class="cell"><div class="date">5</div></section>
    <section class="cell"><div class="date">6</div></section>
    <section class="cell"><div class="date">7</div></section>
    <section class="cell"><div class="date">8</div></section>
    <section class="cell"><div class="date">9</div></section>
    <section class="cell"><div class="date">10</div></section>
    <section class="cell today"><div class="date"><span class="date-badge">11</span></div></section>

    <section class="cell">
      <div class="date">12</div>
      <div class="events">
        <article class="event event-inline" aria-label="14:00-14:30 Test event">
          <div class="event-line"><span class="event-time">14:00-14:30</span><span class="event-sep"> </span><span class="event-title">Test</span></div>
        </article>
      </div>
    </section>
    <section class="cell"><div class="date">13</div></section>
    <section class="cell"><div class="date">14</div></section>
    <section class="cell"><div class="date">15</div></section>
    <section class="cell"><div class="date">16</div></section>
    <section class="cell"><div class="date">17</div></section>
    <section class="cell"><div class="date">18</div></section>

    <section class="cell"><div class="date">19</div></section>
    <section class="cell"><div class="date">20</div></section>
    <section class="cell"><div class="date">21</div></section>
    <section class="cell"><div class="date">22</div></section>
    <section class="cell"><div class="date">23</div></section>
    <section class="cell"><div class="date">24</div></section>
    <section class="cell"><div class="date">25</div></section>

    <section class="cell"><div class="date">26</div></section>
    <section class="cell"><div class="date">27</div></section>
    <section class="cell"><div class="date">28</div></section>
    <section class="cell"><div class="date">29</div></section>
    <section class="cell"><div class="date">30</div></section>
    <section class="cell"><div class="date">31</div></section>
    <section class="cell other"><div class="date">1</div></section>
  </main>
</body>
</html>
