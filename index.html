<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>E1003 Calendar</title>
  <style>
    :root{--bg:#fff;--line:#d8d8d8;--text:#111;--event:#efefef;--today:#111}
    *{box-sizing:border-box}
    html,body{margin:0;width:100%;height:100%;background:var(--bg);color:var(--text);font-family:Arial,Helvetica,sans-serif;touch-action:manipulation}
    body{display:flex;flex-direction:column;min-height:100vh}
    .topbar{display:flex;justify-content:center;align-items:center;padding:14px 24px 10px;border-bottom:1px solid var(--line)}
    .title{font-size:32px;font-weight:700;line-height:1}
    .calendar{display:grid;grid-template-columns:repeat(7,1fr);grid-template-rows:56px repeat(5,1fr);flex:1;min-height:0}
    .dow,.cell{border-right:1px solid var(--line);border-bottom:1px solid var(--line)}
    .dow:nth-child(7),.cell:nth-child(7n){border-right:none}
    .dow{display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;letter-spacing:.2px;background:#fafafa;color:#333}
    .cell{position:relative;padding:10px 10px 8px;min-height:0;overflow:hidden}
    .date{font-size:22px;font-weight:600;line-height:1;color:var(--text);text-align:center;width:100%;display:block}
    .other .date{color:#9a9a9a}
    .today .date-badge{display:inline-flex;align-items:center;justify-content:center;min-width:34px;height:34px;padding:0 8px;border-radius:999px;background:var(--today);color:#fff;margin:0 auto}
    .events{margin-top:10px;display:flex;flex-direction:column;gap:6px}
    .event{background:var(--event);border:1px solid #cfcfcf;border-radius:8px;padding:8px 10px;line-height:1.15;overflow:hidden}
    .event-line{display:flex;gap:8px;align-items:baseline;flex-wrap:wrap}
    .event-time,.event-title{font-size:27px;font-weight:700;line-height:1;white-space:nowrap}
  </style>
</head>
<body>
  <header class="topbar"><div class="title" id="monthTitle">July 2026</div></header>
  <main class="calendar" id="calendar" aria-label="Monthly calendar"></main>

  <script>
    const CALENDAR_ID = 'dcyt122024@gmail.com';
    const API_KEY = 'AIzaSyAUhbzcmS9bdGjTwxNmi3RP2MuuOK7U-Io';
    const monthTitle = document.getElementById('monthTitle');
    const calendar = document.getElementById('calendar');

    const now = new Date();
    let viewDate = new Date(now.getFullYear(), now.getMonth(), 1);

    const pad = n => String(n).padStart(2, '0');
    const keyOf = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    const monthLabel = d => d.toLocaleString('en-US', { month: 'long', year: 'numeric' });
    const startOfMonth = d => new Date(d.getFullYear(), d.getMonth(), 1);
    const endOfMonth = d => new Date(d.getFullYear(), d.getMonth()+1, 1);
    const fmtTime = d => `${pad(d.getHours())}:${pad(d.getMinutes())}`;

    function buildGrid(monthDate) {
      monthTitle.textContent = monthLabel(monthDate);
      calendar.innerHTML = '';
      ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(x => {
        const el = document.createElement('div');
        el.className = 'dow';
        el.textContent = x;
        calendar.appendChild(el);
      });
      const first = startOfMonth(monthDate);
      const start = new Date(first);
      start.setDate(first.getDate() - first.getDay());
      for (let i = 0; i < 42; i++) {
        const dt = new Date(start);
        dt.setDate(start.getDate() + i);
        const cell = document.createElement('section');
        cell.className = 'cell' + (dt.getMonth() !== monthDate.getMonth() ? ' other' : '');
        cell.dataset.date = keyOf(dt);
        const dateDiv = document.createElement('div');
        dateDiv.className = 'date';
        dateDiv.innerHTML = dt.toDateString() === new Date().toDateString() ? `<span class="date-badge">${dt.getDate()}</span>` : `${dt.getDate()}`;
        cell.appendChild(dateDiv);
        calendar.appendChild(cell);
      }
    }

    async function loadEvents() {
      const timeMin = startOfMonth(viewDate).toISOString();
      const timeMax = endOfMonth(viewDate).toISOString();
      const url = new URL(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CALENDAR_ID)}/events`);
      url.searchParams.set('key', API_KEY);
      url.searchParams.set('timeMin', timeMin);
      url.searchParams.set('timeMax', timeMax);
      url.searchParams.set('singleEvents', 'true');
      url.searchParams.set('orderBy', 'startTime');
      url.searchParams.set('maxResults', '250');
      const res = await fetch(url.toString());
      if (!res.ok) throw new Error('Google Calendar API error');
      const data = await res.json();
      const grouped = new Map();
      (data.items || []).forEach(ev => {
        const start = ev.start.dateTime || ev.start.date;
        const day = start.slice(0, 10);
        if (!grouped.has(day)) grouped.set(day, []);
        grouped.get(day).push(ev);
      });
      [...calendar.querySelectorAll('.cell')].forEach(cell => {
        const day = cell.dataset.date;
        if (!day) return;
        const list = grouped.get(day);
        if (!list || !list.length) return;
        let container = cell.querySelector('.events');
        if (!container) {
          container = document.createElement('div');
          container.className = 'events';
          cell.appendChild(container);
        }
        container.innerHTML = '';
        list.slice(0, 3).forEach(ev => {
          const start = ev.start.dateTime || ev.start.date;
          const end = ev.end.dateTime || ev.end.date;
          const t1 = ev.start.dateTime ? fmtTime(new Date(start)) : 'All day';
          const t2 = ev.start.dateTime ? fmtTime(new Date(end)) : '';
          const article = document.createElement('article');
          article.className = 'event';
          article.innerHTML = `<div class="event-line"><span class="event-time">${t1}${t2 ? '-' + t2 : ''}</span><span class="event-title">${ev.summary || '(No title)'}</span></div>`;
          container.appendChild(article);
        });
      });
    }

    function refresh() { buildGrid(viewDate); loadEvents().catch(() => {}); }
    window.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') { viewDate = new Date(viewDate.getFullYear(), viewDate.getMonth() - 1, 1); refresh(); }
      if (e.key === 'ArrowRight') { viewDate = new Date(viewDate.getFullYear(), viewDate.getMonth() + 1, 1); refresh(); }
    });
    refresh();
  </script>
</body>
</html>
